<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Horas</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- 🔐 LOGIN -->
    <section id="login" class="login">
        <article class="containerLog">
            <div class="form">
                <h2>Login</h2>
                <form>
                    <label for="usuario">Usuario:</label>
                    <input type="text" id="user" placeholder="Usuario">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="pass" placeholder="Contraseña">
                </form>
                <button class="buttonLog" onclick="login()">Entrar</button>
            </div>
        </article>
    </section>

    <!-- 🏠 APP -->
    <div id="app" style="display:none;" class="app">
        <div class="container">

            <!-- Título Bienvenida -->
            <header>
                <h2 id="bienvenida">Bienvenido, Usuario</h2>
            </header>

            <!-- Contenedor columnas -->
            <div class="columnas">

                <!-- Columna izquierda: Entrada/Salida + Total -->
                <div class="col-izquierda">
                    <div class="marcarEntradas">
                        <button class="botonesApp" onclick="marcarEntrada()">Entrada</button>
                        <button class="botonesApp" onclick="marcarSalida()">Salida</button>
                    </div>

                    <div class="total-semana">
                        <h3>Total semana:</h3>
                        <pre id="total"></pre>
                    </div>
                </div>

                <!-- Columna derecha: Lista de registros -->
                <div class="col-derecha">
                    <h3>Registros:</h3>
                    <ul id="lista"></ul>
                </div>

            </div>

            <!-- Botón Salir -->
            <footer>
                <button class="salir" onclick="logout()">Salir</button>
            </footer>

        </div>
    </div>
<!-- SOLO ESTO -->
<script type="module" src="js/main.js"></script>
</body>

</html>
