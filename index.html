<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Horas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- LOGIN -->
    <section id="login" class="login">
        <article class="containerLog">
            <div class="form">
                <h2><i class="fas fa-lock"></i> Acceso al Sistema</h2>
                <form>
                    <label for="user">Nombre de Usuario:</label>
                    <input type="text" id="user" placeholder="Escriba su usuario">

                    <label for="pass">Contraseña:</label>
                    <input type="password" id="pass" placeholder="Escriba su clave">
                </form>
                <button class="buttonLog" onclick="login()">INGRESAR AHORA</button>
            </div>
        </article>
    </section>

    <!-- APP -->
    <div id="app" style="display:none;" class="app">
        <div class="container">

            <header>
                <h2 id="bienvenida">Bienvenido, Usuario</h2>
            </header>

            <div class="columnas">

                <!-- IZQUIERDA -->
                <div class="col-izquierda">
                    <h3 class="seccion-titulo">Acciones</h3>

                    <div class="marcarEntradas">
                        <button class="botonesApp btn-entrada" onclick="marcarEntrada()">
                            <div class="icono">🟢</div>
                            <span>ENTRAR</span>
                        </button>

                        <button class="botonesApp btn-salida" onclick="marcarSalida()">
                            <div class="icono">🔴</div>
                            <span>SALIR</span>
                        </button>

                        <!-- Logout móvil -->
                        <button class="salir visible-movil" onclick="logout()">
                            <i class="fas fa-power-off"></i> CERRAR SESIÓN
                        </button>
                    </div>

                    <!-- TOTALES -->
                    <div class="total-semana">
                        <h3>HORAS TOTALES:</h3>
                        <div id="total"></div>
                    </div>
                </div>

                <!-- DERECHA -->
                <div class="col-derecha">
                    <h3 class="seccion-titulo">Sus Últimos Registros</h3>
                    <ul id="lista"></ul>
                </div>

            </div>

            <!-- Logout web -->
            <footer>
                <button class="salir visible-web" onclick="logout()">
                    <i class="fas fa-power-off"></i> CERRAR SESIÓN
                </button>
            </footer>

        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
